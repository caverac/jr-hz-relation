repos:
  - repo: local
    hooks:
      # --- Python formatters (auto-fix) ---
      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]
        files: ^packages/experiments/

      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types: [python]
        files: ^packages/experiments/

      # --- Python linters ---
      - id: flake8
        name: flake8
        entry: uv run flake8
        language: system
        types: [python]
        files: ^packages/experiments/

      # pylint runs on src only: tests trip matplotlib/pytest false positives that
      # are not worth disabling (the CI gate is likewise src-only).
      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        files: ^packages/experiments/src/

      - id: pydocstyle
        name: pydocstyle
        entry: uv run pydocstyle
        language: system
        types: [python]
        files: ^packages/experiments/src/

      # --- Python typecheck (whole-project, not per-file) ---
      - id: mypy
        name: mypy
        entry: uv run mypy packages/experiments/src packages/experiments/tests
        language: system
        types: [python]
        pass_filenames: false
        files: ^packages/experiments/

      # --- JS/TS formatter (auto-fix; respects .prettierignore) ---
      - id: prettier
        name: prettier
        entry: yarn prettier --write
        language: system
        types_or: [javascript, jsx, ts, tsx, json, markdown, yaml, css]

      # --- JS/TS linter (auto-fix where possible) ---
      - id: eslint
        name: eslint
        entry: yarn eslint --max-warnings 0 --fix
        language: system
        types_or: [javascript, jsx, ts, tsx]

      # --- JS/TS typecheck (whole-project) ---
      - id: typecheck-ts
        name: tsc
        entry: yarn typecheck
        language: system
        pass_filenames: false
        types_or: [ts, tsx]

  # --- Commit message lint (Conventional Commits, for semantic-release) ---
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        entry: yarn commitlint --edit
        language: system
        stages: [commit-msg]
        always_run: true
